<svg width="900" height="200" viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F7EEE1"/>
      <stop offset="55%" stop-color="#F0E3D0"/>
      <stop offset="100%" stop-color="#E3B7A4"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C9B8E8" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#C9B8E8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E8C468" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#E8C468" stop-opacity="0"/>
    </radialGradient>
    <style>
      .sparkle{ transform-origin: center; animation: twinkle 2.6s ease-in-out infinite; }
      .sparkle.d1{ animation-delay: 0s; }
      .sparkle.d2{ animation-delay: .6s; }
      .sparkle.d3{ animation-delay: 1.2s; }
      .sparkle.d4{ animation-delay: 1.8s; }
      .sparkle.d5{ animation-delay: .3s; }
      @keyframes twinkle{
        0%, 100% { opacity: .2; transform: scale(.7); }
        50% { opacity: 1; transform: scale(1.15); }
      }
      .moon{ animation: drift 5s ease-in-out infinite; transform-origin: center; }
      @keyframes drift{
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-6px); }
      }
      .cursor{ animation: blink 1s steps(1) infinite; }
      @keyframes blink{
        0%, 49% { opacity: 1; }
        50%, 100% { opacity: 0; }
      }
      .blob{ animation: pulse 6s ease-in-out infinite; transform-origin: center; }
      @keyframes pulse{
        0%, 100% { opacity: .6; }
        50% { opacity: 1; }
      }
    </style>
  </defs>

  <rect width="900" height="200" fill="url(#bg)"/>
  <circle class="blob" cx="150" cy="60" r="130" fill="url(#glow1)"/>
  <circle class="blob" cx="760" cy="150" r="150" fill="url(#glow2)" style="animation-delay:2s"/>

  <!-- crescent moon glyph, echoes hero-glyph from the portfolio -->
  <g class="moon" transform="translate(95,100)">
    <path d="M0 -46 a46 46 0 1 0 0.1 0 a34 34 0 1 1 -0.1 0" fill="#C1876F" opacity="0.92"/>
  </g>

  <!-- scattered sparkles -->
  <path class="sparkle d1" transform="translate(50,150)" d="M0 -9 L2.6 -2.6 9 0 2.6 2.6 0 9 -2.6 2.6 -9 0 -2.6 -2.6 Z" fill="#4A3728"/>
  <path class="sparkle d2" transform="translate(210,55)" d="M0 -7 L2 -2 7 0 2 2 0 7 -2 2 -7 0 -2 -2 Z" fill="#8B9A73"/>
  <path class="sparkle d3" transform="translate(165,150) scale(0.8)" d="M0 -9 L2.6 -2.6 9 0 2.6 2.6 0 9 -2.6 2.6 -9 0 -2.6 -2.6 Z" fill="#C1876F"/>
  <path class="sparkle d4" transform="translate(830,45) scale(1.1)" d="M0 -9 L2.6 -2.6 9 0 2.6 2.6 0 9 -2.6 2.6 -9 0 -2.6 -2.6 Z" fill="#4A3728"/>
  <path class="sparkle d5" transform="translate(700,170) scale(0.7)" d="M0 -9 L2.6 -2.6 9 0 2.6 2.6 0 9 -2.6 2.6 -9 0 -2.6 -2.6 Z" fill="#8B9A73"/>

  <!-- wordmark -->
  <text x="270" y="105" font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-size="56" fill="#4A3728">dela</text>
  <text x="272" y="132" font-family="Georgia, serif" font-size="15" fill="#7A6350">software developer, dreaming in earth tones</text>

  <!-- terminal-style tagline with blinking cursor -->
  <text x="272" y="165" font-family="'Courier New', monospace" font-size="14" letter-spacing="1" fill="#C1876F">AI_DETECTION · IOT · WEB · CYBERSEC<tspan class="cursor" fill="#4A3728">_</tspan></text>
</svg>
